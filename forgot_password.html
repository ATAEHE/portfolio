<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESET PASSWORD | AL AHLY SC</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<style>
 /* تنسيق صفحة الدخول الفخمة */
.login-page-bg {
    background: #fdfdfd; /* خلفية بيضاء صريحة وفخمة */
    min-height: 100vh;
}

.login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    padding-top: 80px; /* مسافة من الهيدر */
}

.login-card {
    background: #fff;
    width: 100%;
    max-width: 480px;
    padding: 50px;
    border: 1px solid #000; /* حدود سوداء حادة زي ريال مدريد */
    text-align: center;
}

.login-brand img {
    height: 80px;
    margin-bottom: 20px;
}

.login-brand h2 {
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    margin-bottom: 40px;
}

/* ستايل الـ Floating Labels */
.input-field {
    position: relative;
    margin-bottom: 30px;
    text-align: left;
}

.input-field input {
    width: 100%;
    padding: 12px 0;
    border: none;
    border-bottom: 1px solid #ccc; /* خط تحت المدخلات فقط */
    outline: none;
    font-weight: bold;
    font-size: 14px;
    background: transparent;
    transition: 0.3s;
}

.input-field label {
    position: absolute;
    top: 12px;
    left: 0;
    color: #999;
    font-weight: 700;
    font-size: 12px;
    pointer-events: none;
    transition: 0.3s;
}

/* حركة الأنيميشن عند الكتابة */
.input-field input:focus, 
.input-field input:valid {
    border-bottom: 2px solid #ff0000; /* خط أحمر أهلاوي عند الكتابة */
}

.input-field input:focus + label, 
.input-field input:valid + label {
    top: -15px;
    font-size: 10px;
    color: #000;
}

.login-helpers {
    text-align: right;
    margin-bottom: 30px;
}

.login-helpers a {
    color: #000;
    text-decoration: none;
    font-size: 11px;
    font-weight: 900;
}

.login-btn-main {
    width: 100%;
    padding: 18px;
    background: #000;
    color: #fff;
    border: none;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    cursor: pointer;
    transition: 0.4s;
}

.login-btn-main:hover {
    background: #ff0000; /* تغيير اللون للأحمر عند اللمس */
    transform: scale(1.02);
}

.login-footer {
    margin-top: 30px;
    font-size: 11px;
    font-weight: 700;
    color: #666;
}

.login-footer a {
    color: #ff0000;
    text-decoration: none;
    margin-right: 5px;
}
</style>
<body class="login-page-bg">

    <header class="rm-style-header">
        <div class="main-nav">
            <div class="container-nav">
                <div class="menu-icon" onclick="toggleMenu()">
                    <span></span><span></span><span></span>
                </div>
                <div class="logo-sec">
                    <a href="index.html"><img src="" class="royal-logo"></a>
                </div>
                <div class="search-section">
                </div>
            </div>
        </div>
    </header>

    <main class="login-wrapper">
        <div class="login-card">
            <div class="login-brand">
                <h2>FORGOT PASSWORD</h2>
                <p style="font-size: 13px; color: #666; margin-bottom: 30px;">أدخل بريدك الإلكتروني وسنرسل لك رابطاً لاستعادة كلمة المرور.</p>
                <p>اتعالج عشان ذاكرتك ضعيفة</p>
            </div>
            
            <form class="login-form">
                <div class="input-field">
                    <input type="email" id="email" required>
                    <label for="email">USER EMAIL</label>
                </div>

                <button type="submit" class="login-btn-main">SEND RESET LINK</button>
            </form>

            <div class="login-footer">
                <p>BACK TO <a href="login.html">LOGIN</a></p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
