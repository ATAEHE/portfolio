<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأهلي 12 | فخر أفريقيا</title>
    <link rel="stylesheet" href="elahly.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<style>
.trophy-container {
    max-width: 1200px;
    margin: 50px auto;
    padding: 20px;
    text-align: center;
}

.section-title {
    font-family: 'Oswald', sans-serif;
    font-size: 35px;
    color: #ffffff;
    margin-bottom: 40px;
    text-transform: uppercase;
    border-bottom: 4px solid #ff0000;
    display: inline-block;
}

.trophy-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 30px;
    margin-top: 20px;
}

.trophy-card {
    background: #fff;
    border: 1px solid #eee;
    padding: 30px 20px;
    text-decoration: none; /* عشان يشيل الخط اللي تحت اللينك */
    color: #333;
    transition: 0.4s all ease-in-out;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.trophy-img-wrapper {
    width: 100%;
    height: 250px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
    overflow: hidden;
}

.trophy-card img {
    height: 100%;
    transition: 0.5s;
}

.trophy-card h3 {
    font-size: 18px;
    font-weight: 900;
    margin-bottom: 10px;
    text-transform: uppercase;
}

.trophy-count {
    background: #ff0000;
    color: #fff;
    padding: 5px 15px;
    font-weight: bold;
    border-radius: 20px;
    font-size: 14px;
}

.trophy-card:hover {
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    transform: translateY(-10px);
    border-color: #ff0000;
}

.trophy-card:hover img {
    transform: scale(1.1); /* الكأس يكبر شوية */
}

/* الإعدادات الأساسية للموبايل */
@media screen and (max-width: 768px) {
    
    /* 1. الشريط الأسود اللي فوق: نخليه بسيط جداً */
    .top-nav .container {
        justify-content: center; /* سنتر الكلام */
    }
    .top-links {
        display: none; /* إخفاء روابط PLUS و STORE في الموبايل لعدم الزحمة */
    }

    /* 2. الهيدر الأبيض الرئيسي: توزيع ثلاثي واضح */
    .container-nav {
        display: flex;
        justify-content: space-between; /* عنصر يمين، عنصر نص، عنصر شمال */
        align-items: center;
        padding: 0 10px;
        height: 70px;
    }

    /* 3. الثلاث شرط (اليمين): نكبرهم ونبينهم */
    .menu-icon {
        display: flex !important; /* تأكيد ظهورها */
        order: 1; /* أول عنصر على اليمين */
        margin: 0;
        z-index: 100;
    }
    .menu-icon span {
        width: 25px;
        height: 3px;
        background: #000;
        margin: 2px 0;
    }

    /* 4. اللوجو (المنتصف): نخليه في النص بالظبط */
    .logo-sec {
        order: 2;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
    }
    .royal-logo {
        height: 55px; /* صغرناه شوية عشان الموبايل */
        margin-top: 0;
        transform: none;
    }

    /* 5. البحث (الشمال): يظهر كأيقونة أو بوكس صغير جداً */
    .search-section {
        order: 3; /* آخر عنصر على الشمال */
        display: flex;
        justify-content: flex-end;
    }
    .search-wrapper {
        width: 100px; /* بوكس صغير جداً */
        padding: 5px;
    }
    #searchInput {
        font-size: 10px;
    }

    /* 6. إخفاء المنيو العريضة: دي أهم خطوة عشان الزراير متبوظش */
    .nav-menu {
        display: none !important; /* بنخفي (News, Trophies, Team) من الهيدر */
    }

    /* 7. الـ Hero Section (الصورة اللي تحت الهيدر) */
    .hero-text h1 {
        font-size: 30px !important; /* تصغير العنوان الكبير */
        line-height: 1.2;
    }
    .hero-btns {
        display: flex;
        flex-direction: column; /* الزراير تحت بعض في الموبايل */
        gap: 10px;
    }
    .hero-btns a {
        padding: 10px 20px;
        font-size: 14px;
    }
}
</style>

<body>

</body>
